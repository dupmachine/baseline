name: Release
on:
  workflow_dispatch:
    inputs:
      version:
        description: New version without v prefix (e.g. 0.1.0)
        required: true
        type: string
      base_sha:
        description: Expected HEAD SHA of main
        required: true
        type: string
concurrency:
  group: release-baseline
jobs:
  release:
    uses: rubykatzen/baseline/.github/workflows/release-shared.yml@v0.1.0
    with:
      version: ${{ inputs.version }}
      base_sha: ${{ inputs.base_sha }}
    secrets: inherit
