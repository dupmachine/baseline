name: shellcheck
description: Lint shell scripts using the canonical shellcheck config from baseline.
runs:
  using: composite
  steps:
    - run: sudo apt-get install -y shellcheck
      shell: bash
    - shell: bash
      run: |
        mapfile -t sh_files < <(find . -name "*.sh")
        [ ${#sh_files[@]} -gt 0 ] && shellcheck --rcfile "${{ github.action_path }}/../../../configs/shellcheck.rc" "${sh_files[@]}"
